# Ed25519 seed file — base64-encoded 32-byte seed (same identity as CodeIsland Mac app)
# This replaces the old deviceId + jwtSecret approach.
ed25519SeedFile: "~/.claude/sync-daemon-seed.b64"

# ─── Server ──────────────────────────────────────────────────────────────────
serverUrl: "https://mio-server-production.up.railway.app"

# ─── JSONL Session Files ──────────────────────────────────────────────────────
jsonlPath: "~/.claude/projects"

# ─── Polling ─────────────────────────────────────────────────────────────────
pollInterval: 5.0

# ─── Outbox (offline resilience) ────────────────────────────────────────────────
outboxPath: "~/.claude/sync-daemon-outbox.jsonl"

# ─── Cache ──────────────────────────────────────────────────────────────────
cachePath: "~/.claude/sync-daemon-sessions.json"
watcherStatePath: "~/.claude/sync-daemon-watcher-state.json"